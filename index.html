<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Machine — GentsClubs.com</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#3a3a3a;--ar:58;--ag:58;--ab:58}

body{
  background:#060606;
  color:#ccc;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ── */
header{
  padding:14px 28px;
  background:#080808;
  border-bottom:1px solid #141414;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  position:relative;
}
header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity .5s;
}
body.live header::after{opacity:.65}
body.live header{
  background:radial-gradient(ellipse at 50% 150%,rgba(var(--ar),var(--ag),var(--ab),.08) 0%,transparent 65%),#080808;
}
h1{font-size:1.25rem;font-weight:900;letter-spacing:-.6px;color:#fff;line-height:1}
h1 em{font-style:normal;color:var(--accent);transition:color .35s}
.tagline{font-size:.65rem;color:#333;margin-top:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}


/* ── LAYOUT ── */
.wrap{
  max-width:1280px;margin:0 auto;padding:20px 28px;
  display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;
}
@media(max-width:860px){.wrap{grid-template-columns:1fr;padding:16px}}

/* ── CARD ── */
.card{
  background:#090909;border:1px solid #181818;border-radius:11px;padding:20px;
  transition:border-color .4s,box-shadow .4s;
}
body.live .card{
  border-color:rgba(var(--ar),var(--ag),var(--ab),.26);
  box-shadow:0 0 50px rgba(var(--ar),var(--ag),var(--ab),.07),0 8px 36px rgba(0,0,0,.65);
}
.section-title{
  font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;
  color:#323232;margin-bottom:15px;transition:color .4s;
}
body.live .section-title{color:rgba(var(--ar),var(--ag),var(--ab),.7)}

/* accent stripe on form card */
.form-card{position:relative;overflow:hidden}
.form-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity .5s;
}
body.live .form-card::before{opacity:.85}

/* ── FORM ── */
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{
  display:block;font-size:.62rem;font-weight:700;
  color:#323232;margin-bottom:4px;
  text-transform:uppercase;letter-spacing:.7px;transition:color .35s;
}
body.live label{color:rgba(var(--ar),var(--ag),var(--ab),.55)}

input,select,textarea{
  width:100%;background:#0c0c0c;border:1px solid #202020;border-radius:7px;
  color:#ccc;padding:8px 11px;font-size:.85rem;font-family:inherit;
  font-weight:500;outline:none;
  transition:border-color .2s,box-shadow .2s,background .15s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);background:#0f0f0f;
  box-shadow:0 0 0 3px rgba(var(--ar),var(--ag),var(--ab),.16);
}
input::placeholder,textarea::placeholder{color:#262626}
textarea{resize:vertical;min-height:72px;line-height:1.5}
select option{background:#0c0c0c}
input[type=date],input[type=time]{color-scheme:dark}

#venueSelect{
  font-weight:700;color:var(--accent);
  border-color:rgba(var(--ar),var(--ag),var(--ab),.22);transition:all .35s;
}
#venueSelect option{color:#ccc}
#venueSelect option[value=""]{color:#444}

/* ── DISCORD PREVIEW ── */
.discord-wrap{
  background:#2b2d31;border-radius:8px;padding:14px 16px;
}
.d-embed{display:flex;border-radius:3px;overflow:hidden;background:#2b2d31}
.d-bar{width:4px;flex-shrink:0;background:var(--accent);
  box-shadow:2px 0 12px rgba(var(--ar),var(--ag),var(--ab),.4);
  transition:background .35s,box-shadow .35s;
}
.d-body{padding:12px 14px 14px;flex:1;min-width:0}
.d-author{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.d-author-img{width:22px;height:22px;border-radius:50%;object-fit:contain;background:#1e1e1e;flex-shrink:0}
.d-author-name{font-size:.78rem;font-weight:600;color:#e0e0e0}
.d-title{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3}
.d-inner{display:flex;gap:12px;align-items:flex-start}
.d-text{flex:1;min-width:0}
.d-desc{font-size:.8rem;color:#dbdee1;line-height:1.5;white-space:pre-wrap;margin-bottom:9px}
.d-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px}
.d-fw{grid-column:1/-1}
.d-fn{font-size:.69rem;font-weight:700;color:#e0e0e0;margin-bottom:2px}
.d-fv{font-size:.74rem;color:#dbdee1;line-height:1.4}
.d-qr{flex-shrink:0;width:72px}
.d-qr img{width:72px;height:72px;border-radius:3px;display:block}
.d-footer{display:flex;align-items:center;gap:7px;margin-top:10px;
  padding-top:8px;border-top:1px solid #35373c}
.d-footer-img{width:17px;height:17px;border-radius:50%;object-fit:contain;flex-shrink:0}
.d-footer-txt{font-size:.67rem;color:#87898f}
.d-placeholder{color:#3a3a3a;font-size:.82rem;font-style:italic;padding:4px 0}

/* ── POST BUTTON ── */
.post-wrap{margin-top:14px}
.post-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--ar),var(--ag),var(--ab),.22),transparent);
  margin-bottom:14px;
}
.post-btn{
  width:100%;padding:14px 20px;
  font-size:.88rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  font-family:inherit;border:none;border-radius:9px;cursor:pointer;
  background:var(--accent);color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 2px 10px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:all .22s;
}
.post-btn:hover:not(:disabled){
  filter:brightness(1.18);transform:translateY(-1px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 6px 24px rgba(var(--ar),var(--ag),var(--ab),.42);
}
.post-btn:active:not(:disabled){transform:translateY(0);filter:brightness(1.05)}
.post-btn:disabled{opacity:.32;cursor:not-allowed;transform:none;filter:none;
  box-shadow:0 2px 10px rgba(0,0,0,.5)}
.post-btn.done{background:#0f2e0f;color:#4caf50;cursor:default;
  box-shadow:none;transform:none;filter:none}

.clear-btn{
  width:100%;margin-top:10px;padding:9px 16px;
  font-size:.75rem;font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  font-family:inherit;border:1px solid #1e1e1e;border-radius:8px;cursor:pointer;
  background:transparent;color:#444;
  transition:border-color .2s,color .2s;
}
.clear-btn:hover{border-color:#333;color:#888}

.status-item{
  display:flex;align-items:center;gap:8px;
  font-size:.74rem;font-weight:600;padding:6px 11px;border-radius:6px;margin-top:7px;
}
.s-ok{background:#0c260c;color:#4caf50;border:1px solid #174817}
.s-err{background:#260c0c;color:#e05555;border:1px solid #481717}

.channel-select{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.channel-chk{display:flex;align-items:center;gap:6px;font-size:.68rem;color:#484848;cursor:pointer;user-select:none}
.channel-chk:hover{color:#888}
.channel-chk input[type=checkbox]{width:13px;height:13px;accent-color:var(--accent);cursor:pointer}

.label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.label-row label{margin-bottom:0}
.enhance-btn{
  background:none;border:1px solid #252525;border-radius:5px;
  color:#484848;font-size:.68rem;font-family:inherit;font-weight:600;
  padding:3px 9px;cursor:pointer;transition:all .2s;letter-spacing:.2px;
}
.enhance-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.enhance-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#080808}
::-webkit-scrollbar-thumb{background:#202020;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#2c2c2c}

/* ── IMPORT BUTTON ── */
.import-btn{
  width:100%;padding:9px 14px;
  background:#0c0c0c;border:1px dashed #1e1e1e;border-radius:7px;
  color:#363636;font-family:inherit;font-size:.76rem;font-weight:700;letter-spacing:.3px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.import-btn:hover{border-color:#363636;color:#888;background:#0f0f0f}
.import-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── CALENDAR MODAL ── */
#calModal{
  position:fixed;inset:0;z-index:8888;
  background:rgba(0,0,0,.82);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
#calModal.hidden{display:none}
.cal-box{
  background:#0c0c0c;border:1px solid #1e1e1e;border-radius:12px;
  width:100%;max-width:460px;max-height:78vh;display:flex;flex-direction:column;overflow:hidden;
}
.cal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 18px;border-bottom:1px solid #181818;flex-shrink:0;
}
.cal-title{font-size:.82rem;font-weight:800;color:#ccc;letter-spacing:-.2px}
.cal-close{
  background:none;border:none;color:#383838;cursor:pointer;
  font-size:1rem;line-height:1;padding:3px 7px;border-radius:4px;transition:color .15s;
}
.cal-close:hover{color:#aaa}
.cal-body{overflow-y:auto;padding:8px;flex:1}
.cal-loading,.cal-msg{color:#333;font-size:.8rem;font-style:italic;padding:28px 8px;text-align:center}
.cal-item{
  display:flex;align-items:center;gap:12px;padding:10px 10px;
  border-radius:8px;cursor:pointer;transition:background .15s;
  border:1px solid transparent;margin-bottom:3px;
}
.cal-item:last-child{margin-bottom:0}
.cal-item:hover{background:#111;border-color:#1e1e1e}
.cal-date-chip{
  font-size:.62rem;font-weight:800;color:#555;text-align:center;
  min-width:38px;background:#0f0f0f;border:1px solid #1a1a1a;
  border-radius:6px;padding:5px 4px;line-height:1.4;flex-shrink:0;
}
.cal-date-chip .chip-d{font-size:.92rem;color:#777;display:block}
.cal-item-name{font-size:.82rem;font-weight:600;color:#bbb;line-height:1.3}
.cal-item-venue{font-size:.67rem;color:#363636;margin-top:2px}

/* ── IMPORTED BADGE ── */
.imported-badge{
  font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  background:#0a200a;border:1px solid #143514;color:#4caf50;padding:2px 7px;border-radius:4px;
}

/* ── SAVE / PUBLISH BUTTONS ── */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save-btn,.pub-btn{
  padding:13px 16px;
  font-size:.82rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  font-family:inherit;border:none;border-radius:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .22s;
}
.save-btn{
  background:#111;border:1px solid #252525;color:#666;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.save-btn:hover:not(:disabled){background:#161616;border-color:#383838;color:#aaa}
.save-btn:disabled{opacity:.3;cursor:not-allowed}
.save-btn.done{background:#0d1a2e;border-color:#1a3a5e;color:#5b9bd5;cursor:default}
.pub-btn{
  background:var(--accent);color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 2px 10px rgba(0,0,0,.5);
}
.pub-btn:hover:not(:disabled){
  filter:brightness(1.18);transform:translateY(-1px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 6px 24px rgba(var(--ar),var(--ag),var(--ab),.42);
}
.pub-btn:active:not(:disabled){transform:translateY(0);filter:brightness(1.05)}
.pub-btn:disabled{opacity:.32;cursor:not-allowed;transform:none;filter:none;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.pub-btn.done{background:#0f2e0f;color:#4caf50;cursor:default;box-shadow:none;transform:none;filter:none}

/* ── HISTORY PANEL ── */
.history-wrap{max-width:1280px;margin:0 auto;padding:0 28px 48px}
.history-header{
  display:flex;align-items:center;gap:12px;
  padding:18px 0 14px;
  border-top:1px solid #141414;
}
.history-title{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#303030}
.history-count{
  font-size:.62rem;font-weight:700;color:#2a2a2a;
  background:#0f0f0f;border:1px solid #1a1a1a;border-radius:10px;padding:2px 8px;
}
.history-empty{color:#282828;font-size:.82rem;font-style:italic;padding:20px 0}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.h-card{
  background:#090909;border:1px solid #181818;border-radius:10px;padding:16px;
  transition:border-color .2s;
}
.h-card:hover{border-color:#252525}
.h-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.h-card-info{flex:1;min-width:0}
.h-venue{font-size:.65rem;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.h-event{font-size:.88rem;font-weight:700;color:#ccc;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-date{font-size:.7rem;color:#3a3a3a;margin-top:3px}
.h-badge{
  font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;
  padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;
}
.h-badge.saved{background:#141414;color:#484848;border:1px solid #1e1e1e}
.h-badge.published{background:#0a200a;color:#4caf50;border:1px solid #143514}
.h-meta{font-size:.67rem;color:#2e2e2e;margin-bottom:12px}
.h-actions{display:flex;gap:7px}
.h-post-status:not(:empty){margin-top:8px}
.h-btn{
  flex:1;padding:7px 10px;font-size:.68rem;font-weight:700;letter-spacing:.2px;
  font-family:inherit;border-radius:6px;cursor:pointer;transition:all .18s;
  border:1px solid #1e1e1e;background:#0d0d0d;color:#484848;
}
.h-btn:hover{background:#131313;border-color:#2e2e2e;color:#aaa}
.h-btn:disabled{opacity:.4;cursor:not-allowed}
.h-del:hover{background:#1a0a0a !important;border-color:#3a1a1a !important;color:#e05555 !important}
.h-pub:hover{border-color:var(--accent) !important;color:var(--accent) !important}
.h-past{opacity:.5}
.h-past-toggle{
  margin-left:auto;
  background:none;border:1px solid #1e1e1e;border-radius:6px;
  color:#383838;font-size:.62rem;font-weight:700;font-family:inherit;
  padding:4px 10px;cursor:pointer;transition:all .18s;letter-spacing:.2px;
}
.h-past-toggle:hover{border-color:#2e2e2e;color:#666}

/* ── VENUE QUICK TOOLS ── */
.vqt-wrap{max-width:1280px;margin:0 auto;padding:0 28px 60px}
.vqt-header{
  display:flex;align-items:center;gap:12px;
  padding:18px 0 14px;border-top:1px solid #141414;
}
.vqt-title{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#303030}
.vqt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.vqt-card{
  background:#090909;border:1px solid #181818;border-radius:10px;
  overflow:hidden;display:flex;flex-direction:column;
}
.vqt-card-inner{padding:14px 14px 12px;flex:1;display:flex;flex-direction:column;gap:10px;border-left:3px solid var(--vc)}
.vqt-name-row{display:flex;align-items:center;gap:8px}
.vqt-logo{height:24px;width:auto;object-fit:contain;flex-shrink:0}
.vqt-name{font-size:.78rem;font-weight:700;color:#bbb}
.vqt-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.vqt-btn{
  padding:6px 8px;font-size:.65rem;font-weight:700;letter-spacing:.2px;
  font-family:inherit;border-radius:6px;cursor:pointer;transition:all .18s;
  border:1px solid #1e1e1e;background:#0d0d0d;color:#484848;
}
.vqt-btn:hover{background:#131313;border-color:#2e2e2e;color:#aaa}
.vqt-btn.copied{background:#0a1a0a;border-color:#143514;color:#4caf50}
</style>
</head>
<body>

<header>
  <div>
    <h1>Event <em id="accentWord">Machine</em></h1>
    <p class="tagline">GentsClubs.com &nbsp;·&nbsp; Pattaya</p>
  </div>
</header>

<div class="wrap">

  <!-- FORM -->
  <div class="card form-card">
    <div class="section-title">Event Details</div>

    <div class="field">
      <label>Venue</label>
      <select id="venueSelect"><option value="">— Select a venue —</option></select>
    </div>

    <div class="field">
      <button class="import-btn" id="importBtn" onclick="openCalModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        Import from Calendar
      </button>
    </div>

    <div class="field">
      <div class="label-row">
        <label>Event Name</label>
        <span class="imported-badge" id="importedBadge" style="display:none">Imported</span>
      </div>
      <input type="text" id="eventName" placeholder="e.g. Ladies Night, Live DJ, Pool Party">
    </div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="eventDate">
    </div>

    <div class="field row">
      <div>
        <label>Start Time</label>
        <input type="time" id="startTime">
      </div>
      <div>
        <label>End Time</label>
        <input type="time" id="endTime">
      </div>
    </div>

    <div class="field">
      <div class="label-row">
        <label>Description</label>
        <button class="enhance-btn" id="enhanceBtn" onclick="enhanceDesc()">✨ Auto-fill</button>
      </div>
      <textarea id="description" placeholder="What's happening at this event..."></textarea>
    </div>

    <div class="field">
      <label>Specials &amp; Perks</label>
      <textarea id="specials" placeholder="Drink deals, happy hour, entry offers..."></textarea>
    </div>

    <div class="field">
      <label>Poster Image URL</label>
      <input type="url" id="posterUrl" placeholder="Paste image URL to include in the embed">
    </div>
  </div>

  <!-- PREVIEW + POST -->
  <div class="card">
    <div class="section-title">Discord Embed Preview</div>
    <div class="discord-wrap">
      <div class="d-embed">
        <div class="d-bar" id="dBar"></div>
        <div class="d-body" id="dBody">
          <div class="d-placeholder">Select a venue to preview...</div>
        </div>
      </div>
    </div>

    <div class="post-wrap">
      <div class="post-divider"></div>
      <div class="btn-row">
        <button class="save-btn" id="saveBtn" onclick="saveForLater()" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
          <span id="saveLabel">Save for Later</span>
        </button>
        <button class="pub-btn" id="publishBtn" onclick="publishNow()" disabled>

// ── HELPERS ───────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0') }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function parseTime(s) {
  s = s.trim().toLowerCase();
  if (s === 'midnight') return '00:00';
  if (s === 'noon') return '12:00';
  const m = s.match(/^(\d+)(am|pm)$/);
  if (!m) return '';
  let h = +m[1];
  if (m[2]==='pm' && h!==12) h+=12;
  if (m[2]==='am' && h===12) h=0;
  return `${pad(h)}:00`;
}
function fmt12(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  if (h===0)  return `12:${pad(m)} AM`;
  if (h===12) return `12:${pad(m)} PM`;
  return h<12 ? `${h}:${pad(m)} AM` : `${h-12}:${pad(m)} PM`;
}
function fmtDate(s) {
  if (!s) return '';
  const [y,mo,d] = s.split('-').map(Number);
  return new Date(y,mo-1,d).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function clearForm() {
  const now = new Date();
  document.getElementById('venueSelect').value  = '';
  document.getElementById('eventName').value    = '';
  document.getElementById('description').value  = '';
  document.getElementById('specials').value     = '';
  document.getElementById('posterUrl').value    = '';
  document.getElementById('eventDate').value    =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('startTime').value    = '';
  document.getElementById('endTime').value      = '';
  document.getElementById('importedBadge').style.display = 'none';

  document.getElementById('publishBtn').disabled = true;

  document.getElementById('publishLabel').textContent = 'Publish Now';

  document.getElementById('publishBtn').classList.remove('done');
  posted = false;
  setAccent('#3a3a3a');
  document.body.classList.remove('live');
  renderPreview({});
}

function setAccent(hex) {
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--ar', parseInt(hex.slice(1,3),16));
  document.documentElement.style.setProperty('--ag', parseInt(hex.slice(3,5),16));
  document.documentElement.style.setProperty('--ab', parseInt(hex.slice(5,7),16));
  document.getElementById('accentWord').style.color = hex;
}
function getForm() {
  const i = document.getElementById('venueSelect').value;
  return {
    venue      : i !== '' ? VENUES[+i] : null,
    eventName  : document.getElementById('eventName').value.trim(),
    date       : document.getElementById('eventDate').value,

    endTime    : document.getElementById('endTime').value,

// ── VENUE CHANGE ──────────────────────────────────────────────
function onVenue() {
  const i = document.getElementById('venueSelect').value;
  if (i === '') { setAccent('#3a3a3a'); document.body.classList.remove('live'); return; }
  const v = VENUES[+i];
  setAccent(v.color);
  document.body.classList.add('live');
  const parts = v.hours.split(' to ');
  if (parts.length === 2) {
    document.getElementById('startTime').value = parseTime(parts[0]);
    document.getElementById('endTime').value   = parseTime(parts[1]);
  }
  posted = false;
  document.getElementById('postStatus').innerHTML = '';
  document.getElementById('saveLabel').textContent = 'Save for Later';
  document.getElementById('publishLabel').textContent = 'Publish Now';
  document.getElementById('saveBtn').classList.remove('done');
  document.getElementById('publishBtn').classList.remove('done');
  onChange();
}

  const d = getForm();

// ── DISCORD PREVIEW ───────────────────────────────────────────
function renderPreview(d) {
  const bar  = document.getElementById('dBar');
  const body = document.getElementById('dBody');
  if (!d.venue) {
    bar.style.cssText = '';
    body.innerHTML = '<div class="d-placeholder">Select a venue to preview...</div>';
    return;
  }
  bar.style.background = d.venue.color;
  bar.style.boxShadow  = `2px 0 12px rgba(${parseInt(d.venue.color.slice(1,3),16)},${parseInt(d.venue.color.slice(3,5),16)},${parseInt(d.venue.color.slice(5,7),16)},.4)`;

  const qr      = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(d.venue.mapsUrl)}`;
  const dateStr = d.date ? fmtDate(d.date) : 'Date TBC';
  const timeStr = (d.startTime && d.endTime) ? `${fmt12(d.startTime)} — ${fmt12(d.endTime)}` : d.venue.hours;

  let h = '';

  // Title
  if (d.eventName) h += `<div class="d-title">${esc(d.eventName)}</div>`;

  // Inner: text + QR
  h += `<div class="d-inner"><div class="d-text">`;
  if (d.description) h += `<div class="d-desc">${esc(d.description)}</div>`;

  h += `<div class="d-fields">`;
  h += `<div><div class="d-fn">Date</div><div class="d-fv">${esc(dateStr)}</div></div>`;
  h += `<div><div class="d-fn">Time</div><div class="d-fv">${esc(timeStr)}</div></div>`;
  if (d.specials) h += `<div class="d-fw"><div class="d-fn">Specials &amp; Perks</div><div class="d-fv">${esc(d.specials)}</div></div>`;
  h += `</div>`;
  h += `<div style="margin-top:8px"><a href="${esc(d.venue.mapsUrl)}" target="_blank" style="color:#00aff4;font-size:.76rem;font-weight:500;text-decoration:none">📍 Get Directions</a></div>`;
  h += `</div>`;

  h += `<div class="d-qr"><div style="font-size:.6rem;color:#666;text-align:center;margin-bottom:4px">Scan for directions</div><img src="${qr}" alt="QR" onerror="this.style.display='none'"></div>`;
  h += `</div>`;

  // Poster image
  if (d.posterUrl) h += `<img src="${esc(d.posterUrl)}" alt="Poster" style="width:100%;border-radius:3px;margin-top:10px;display:block" onerror="this.style.display='none'">`;

  // Footer
  h += `<div class="d-footer">`;
  h += `<span class="d-footer-txt">Opening Hours: ${esc(d.venue.hours)} &nbsp;·&nbsp; GentsClubs.com Pattaya</span>`;
  h += `</div>`;

  body.innerHTML = h;
}

// ── SAVE / PUBLISH ────────────────────────────────────────────
async function saveForLater() {
  const d = getForm();
  if (!d.venue || !d.eventName) return;
  const entry = makeEntry(d, 'saved');
  await persistEntry(entry);
  posted = true;
  document.getElementById('saveLabel').textContent = 'Saved';
  document.getElementById('saveBtn').classList.add('done');
  document.getElementById('saveBtn').disabled    = true;
  document.getElementById('publishBtn').disabled = true;
  await renderHistory();
}

async function publishNow(histId) {
  const fromHistory = histId !== undefined;
  let d, entry;
  if (fromHistory) {
    entry = (await getHistory()).find(e => e.id === histId);
    if (!entry) return;
    d = entryToForm(entry);
  } else {
    d = getForm();
    if (!d.venue || !d.eventName) return;
    entry = makeEntry(d, 'published');
  }

  const pubBtn = fromHistory
    ? document.querySelector(`[data-pub="${histId}"]`)
    : document.getElementById('publishBtn');
  const pubLbl    = fromHistory ? null : document.getElementById('publishLabel');
  const cardStatus = fromHistory ? document.getElementById('hps-' + histId) : null;

  if (!fromHistory) {
    document.getElementById('saveBtn').disabled    = true;
    document.getElementById('publishBtn').disabled = true;
    document.getElementById('postStatus').innerHTML = '';
  }
  if (pubBtn) { pubBtn.disabled = true; if (!pubLbl) pubBtn.textContent = 'Posting…'; }
  if (pubLbl) pubLbl.textContent = 'Posting…';
  if (cardStatus) cardStatus.innerHTML = '<div class="status-item" style="color:#888;background:#111;border:1px solid #222">Posting…</div>';

  const statusEl = fromHistory ? cardStatus : document.getElementById('postStatus');
  const ok = await doPost(d, statusEl);

  if (ok) {
    entry.status     = 'published';
    entry.postCount  = (entry.postCount || 0) + 1;
    entry.lastPosted = new Date().toISOString();
    await persistEntry(entry);
    if (!fromHistory) {
      posted = true;
      if (pubLbl) pubLbl.textContent = 'Published';
      if (pubBtn) pubBtn.classList.add('done');
    }
    await renderHistory();
  } else {
    if (pubBtn) { pubBtn.disabled = false; if (!pubLbl) pubBtn.textContent = 'Publish Again'; }
    if (pubLbl) pubLbl.textContent = 'Retry';
    if (!fromHistory) document.getElementById('saveBtn').disabled = false;
  }
}

function onChannelToggle(which) {
  const venue   = document.getElementById('chkVenue');
  const general = document.getElementById('chkGeneral');
  if (!venue.checked && !general.checked) {
    if (which === 'venue') venue.checked = true; else general.checked = true;
  }
}

async function doPost(d, statusEl) {
  const qr      = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(d.venue.mapsUrl)}`;
  const dateStr = d.date ? fmtDate(d.date) : 'Date TBC';
  const timeStr = (d.startTime && d.endTime) ? `${fmt12(d.startTime)} — ${fmt12(d.endTime)}` : d.venue.hours;
  const color   = parseInt(d.venue.color.replace('#',''), 16);

  const embed = {
    title    : d.eventName,
    color,
    thumbnail: {url: qr},
    fields   : [
      {name:'Date',     value: dateStr, inline: true},
      {name:'Time',     value: timeStr, inline: true},
    ],
    footer: {text:`Opening Hours: ${d.venue.hours} · GentsClubs.com Pattaya`}
  };
  const dirLink = `[📍 Get Directions](${d.venue.mapsUrl})`;
  const eventsLink = `[📅 See All Events](https://pattayapilot.com/events)`;
  embed.description = d.description ? `${d.description}\n\n${dirLink} · ${eventsLink}` : `${dirLink} · ${eventsLink}`;
  if (d.specials)  embed.fields.push({name:'Specials & Perks', value: d.specials, inline: false});
  if (d.posterUrl) embed.image = {url: d.posterUrl};

  const okIcon  = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
  const errIcon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';

  const channels = {
    venue  : document.getElementById('chkVenue')?.checked   ?? true,
    general: document.getElementById('chkGeneral')?.checked ?? true,
  };

  let allOk = false;
  const lines = [];
  try {
    const r = await fetch(WORKER_URL, {
      method : 'POST',
      headers: {'Content-Type':'application/json'},
      body   : JSON.stringify({venueName: d.venue.name, embed, channels}),
    });
    const data = await r.json().catch(() => null);
    if (data && Array.isArray(data.results)) {
      allOk = !!data.ok;
      for (const res of data.results) {
        if (res.ok) {
          lines.push(`<div class="status-item s-ok">${okIcon}${esc(res.label)}</div>`);
        } else {
          console.error('doPost worker error:', res.label, res.error);
          lines.push(`<div class="status-item s-err">${errIcon}${esc(res.label)}: ${esc(res.error || 'failed')}</div>`);
        }
      }
    } else {
      console.error('doPost worker HTTP error:', r.status, data);
      lines.push(`<div class="status-item s-err">${errIcon}Worker error: HTTP ${r.status}</div>`);
    }
  } catch(e) {
    console.error('doPost fetch error:', e);
    lines.push(`<div class="status-item s-err">${errIcon}Worker request failed: ${esc(e.message)}</div>`);
  }

  if (statusEl) statusEl.innerHTML = lines.join('');
  return allOk;
}

// ── CALENDAR IMPORT ───────────────────────────────────────────
async function openCalModal() {
  const modal = document.getElementById('calModal');
  const body  = document.getElementById('calBody');
  modal.classList.remove('hidden');
  body.innerHTML = '<div class="cal-loading">Loading events…</div>';

  const today = new Date(); today.setHours(0,0,0,0);
  const URLS = [
    'https://event-machine-proxy.thailandfordy.workers.dev/calendar',
    'https://tomgentsclubs.github.io/pattayapilot/api/v1/events/index.json',
  ];
  let events;
  let loaded = false;
  for (const url of URLS) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      events = data.events || [];
      loaded = true;
      break;
    } catch(_) { /* try next */ }
  }
  if (!loaded) {
    body.innerHTML = '<div class="cal-msg">Could not load calendar. Try again later.</div>';
    return;
  }

  // Upcoming only
  events = events.filter(ev => {
    if (!ev.date) return false;
    return new Date(ev.date) >= today;
  });

  // Venue filter if one is selected
  const vi = document.getElementById('venueSelect').value;
  if (vi !== '') {
    const vname = VENUES[+vi].name.toLowerCase();
    events = events.filter(ev => {
      const evv = (ev.venue || '').toLowerCase();
      return evv.includes(vname) || vname.includes(evv) || evv === '';
    });
  }

  events.sort((a, b) => new Date(a.date) - new Date(b.date));

  if (!events.length) {
    const label = vi !== '' ? `<strong>${esc(VENUES[+vi].name)}</strong>` : 'any venue';
    body.innerHTML = `<div class="cal-msg">No upcoming events found for ${label}.</div>`;
    return;
  }

  window._calEvents = events;
  body.innerHTML = events.map((ev, i) => {
    const d   = new Date(ev.date + 'T00:00:00');
    const day = d.toLocaleDateString('en-GB', {day:'numeric'});
    const mon = d.toLocaleDateString('en-GB', {month:'short'}).toUpperCase();
    const name = esc(ev.title || ev.name || 'Untitled');
    const venue = ev.venue ? `<div class="cal-item-venue">${esc(ev.venue)}</div>` : '';
    return `<div class="cal-item" onclick="importEvent(${i})">
      <div class="cal-date-chip"><span class="chip-d">${day}</span>${mon}</div>
      <div><div class="cal-item-name">${name}</div>${venue}</div>
    </div>`;
  }).join('');
}

function closeCalModal() {
  document.getElementById('calModal').classList.add('hidden');
}

function importEvent(idx) {
  const ev = (window._calEvents || [])[idx];
  if (!ev) return;

  document.getElementById('eventName').value = ev.title || ev.name || '';

  if (ev.date) {
    const m = ev.date.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) document.getElementById('eventDate').value = `${m[1]}-${m[2]}-${m[3]}`;
  }

  if (ev.image_url) document.getElementById('posterUrl').value = ev.image_url;

  if (ev.description) {
    const cleaned = ev.description.split('\n').filter(line => {
      const l = line.trim().toLowerCase();
      return !l.startsWith('map location:') && !l.startsWith('map:') && !line.includes('maps.app.goo.gl');
    }).join('\n').trim();
    document.getElementById('description').value = cleaned;
  }

  // Reset post state for new data
  posted = false;
  document.getElementById('saveLabel').textContent    = 'Save for Later';
  document.getElementById('publishLabel').textContent = 'Publish Now';
  document.getElementById('saveBtn').classList.remove('done');
  document.getElementById('publishBtn').classList.remove('done');
  document.getElementById('postStatus').innerHTML = '';

  if (document.getElementById('venueSelect').value === '' && ev.venue) {
    const evVenue = ev.venue.toLowerCase();
    const matchIdx = VENUES.findIndex(v => v.name.toLowerCase() === evVenue);
    if (matchIdx >= 0) {
      document.getElementById('venueSelect').value = matchIdx;
      onVenue();
    }
  }

  document.getElementById('importedBadge').style.display = '';
  closeCalModal();
  onChange();
}

// ── HISTORY ───────────────────────────────────────────────────
async function getHistory() {
  try {
    const r = await fetch(WORKER_URL + '/history');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.error('getHistory error:', e);
    return [];
  }
}

function makeEntry(d, status) {
  return {
    id         : Date.now().toString(36) + Math.random().toString(36).slice(2),
    venueIdx   : VENUES.indexOf(d.venue),
    venueName  : d.venue.name,
    eventName  : d.eventName,
    date       : d.date,
    startTime  : d.startTime,
    endTime    : d.endTime,
    description: d.description,
    specials   : d.specials,
    posterUrl  : d.posterUrl,
    status,
    postCount  : status === 'published' ? 1 : 0,
    lastPosted : status === 'published' ? new Date().toISOString() : null,
    savedAt    : new Date().toISOString(),
  };
}

function entryToForm(e) {
  return {
    venue      : VENUES.find(v => v.name.toLowerCase() === (e.venueName || '').toLowerCase()) || VENUES[e.venueIdx],
    eventName  : e.eventName  || '',
    date       : e.date       || '',
    startTime  : e.startTime  || '',
    endTime    : e.endTime    || '',
    description: e.description|| '',
    specials   : e.specials   || '',
    posterUrl  : e.posterUrl  || '',
  };
}

async function persistEntry(entry) {
  entry.savedAt = new Date().toISOString();
  const currentIdx = VENUES.findIndex(v => v.name.toLowerCase() === (entry.venueName || '').toLowerCase());
  if (currentIdx >= 0) entry.venueIdx = currentIdx;
  try {
    await fetch(WORKER_URL + '/history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry),
    });
  } catch (e) {
    console.error('persistEntry error:', e);
  }
}

async function loadFromHistory(id) {
  const entry = (await getHistory()).find(e => e.id === id);
  if (!entry) return;
  const vi = VENUES.findIndex(v => v.name.toLowerCase() === (entry.venueName || '').toLowerCase());
  const resolvedIdx = vi >= 0 ? vi : entry.venueIdx;
  document.getElementById('venueSelect').value   = resolvedIdx >= 0 ? resolvedIdx : '';
  onVenue();
  document.getElementById('eventName').value     = entry.eventName   || '';
  document.getElementById('eventDate').value     = entry.date        || '';
  document.getElementById('startTime').value     = entry.startTime   || '';
  document.getElementById('endTime').value       = entry.endTime     || '';
  document.getElementById('description').value   = entry.description || '';
  document.getElementById('specials').value      = entry.specials    || '';
  document.getElementById('posterUrl').value     = entry.posterUrl   || '';
  posted = false;
  onChange();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

async function deleteFromHistory(id) {
  if (!confirm('Delete this event from history?')) return;
  try {
    await fetch(WORKER_URL + '/history/' + encodeURIComponent(id), { method: 'DELETE' });
  } catch (e) {
    console.error('deleteFromHistory error:', e);
  }
  await renderHistory();
}

function fmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) +
    ' at ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function venueSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

let showPastEvents = false;

async function togglePastEvents() {
  showPastEvents = !showPastEvents;
  document.getElementById('pastToggle').textContent = showPastEvents ? 'Hide Past Events' : 'View Past Events';
  await renderHistory();
}

async function renderHistory() {
  const all = await getHistory();
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = all.filter(e => !e.date || new Date(e.date) >= today);
  const past     = all.filter(e =>  e.date && new Date(e.date) <  today);

  document.getElementById('historyCount').textContent = `${all.length} event${all.length !== 1 ? 's' : ''}`;
  const listEl = document.getElementById('historyList');
  if (!all.length) {
    listEl.innerHTML = '<div class="history-empty">No saved events yet.</div>';
    return;
  }

  function cardHtml(e, dim) {
    const meta = e.status === 'published'
      ? `Posted ${e.postCount} time${e.postCount !== 1 ? 's' : ''}${e.lastPosted ? ' · Last ' + fmtTs(e.lastPosted) : ''}`
      : `Saved ${fmtTs(e.savedAt)}`;
    return `<div class="h-card${dim ? ' h-past' : ''}">
      <div class="h-card-top">
        <div class="h-card-info">
          <div class="h-venue">${esc(e.venueName)}</div>
          <div class="h-event">${esc(e.eventName)}</div>
          <div class="h-date">${esc(e.date ? fmtDate(e.date) : 'No date')}</div>
        </div>
        <div class="h-badge ${e.status}">${e.status === 'published' ? 'Published' : 'Saved'}</div>
      </div>
      <div class="h-meta">${esc(meta)}</div>
      <div class="h-actions">
        <button class="h-btn" onclick="loadFromHistory('${e.id}')">Load</button>
        <button class="h-btn h-pub" data-pub="${e.id}" onclick="publishNow('${e.id}')">${e.status === 'published' || (e.postCount && e.postCount > 0) ? 'Publish Again' : 'Publish Now'}</button>
        <button class="h-btn h-del" onclick="deleteFromHistory('${e.id}')">Delete</button>
      </div>
      <div class="h-post-status" id="hps-${e.id}"></div>
    </div>`;
  }

  const shown = [
    ...upcoming.map(e => cardHtml(e, false)),
    ...(showPastEvents ? past.map(e => cardHtml(e, true)) : []),
  ];
  listEl.innerHTML = shown.length
    ? `<div class="history-grid">${shown.join('')}</div>`
    : '<div class="history-empty">No upcoming events.</div>';
}

function renderVenueQuickTools() {
  const grid = document.getElementById('vqtGrid');
  grid.innerHTML = VENUES.map(v => {
    const slug = venueSlug(v.name);
    const localQr   = BASE + `assets/qr/${slug}.png`;
    return `<div class="vqt-card">
      <div class="vqt-card-inner" style="--vc:${esc(v.color)}">
        <div class="vqt-name-row">
          <img class="vqt-logo" src="${esc(v.logoSmall)}" alt="" onerror="this.style.display='none'">
          <span class="vqt-name">${esc(v.name)}</span>
        </div>
        <div class="vqt-btns">
          <button class="vqt-btn" onclick="vqtCopy(this,'${esc(v.mapsUrl)}')">Copy Maps URL</button>
          <button class="vqt-btn" onclick="vqtCopyQr(this,'${esc(localQr)}')">Copy QR Image</button>
          <button class="vqt-btn" onclick="vqtCopy(this,'https://tomgentsclubs.github.io/event-machine/${esc(v.logoUrl.replace(BASE,''))}')">Copy Logo URL</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function vqtCopy(btn, text) {
  await navigator.clipboard.writeText(text);
  const orig = btn.textContent;
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
}

async function vqtCopyQr(btn, path) {
  try {
    const res = await fetch(path);
    if (!res.ok) throw new Error('not found');
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy QR Image'; btn.classList.remove('copied'); }, 1500);
  } catch(e) {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = 'Copy QR Image'; }, 1500);
  }
}

// ── DROPBOX FIX ───────────────────────────────────────────────
function fixDropbox() {
  const el = document.getElementById('posterUrl');
  if (el.value.includes('dropbox.com')) {
    el.value = el.value.replace(/dl=[01]/g, 'raw=1');

// ── AUTO-FILL ─────────────────────────────────────────────────
function enhanceDesc() {
  const d = getForm();
  if (!d.venue) { alert('Select a venue first.'); return; }

  const btn = document.getElementById('enhanceBtn');
  btn.textContent = '…'; btn.disabled = true;

  const tm = (d.startTime && d.endTime) ? `${fmt12(d.startTime)} to ${fmt12(d.endTime)}` : '';
  const sp = d.specials
    ? d.specials.split(/[,\n]+/).map(s => s.trim()).filter(Boolean).map(s => s.charAt(0).toUpperCase() + s.slice(1))
    : [];

  const gen = COPY_GEN[d.venue.name];
  const copy = gen
    ? gen(d.eventName || "tonight's event", tm, sp)
    : `${d.eventName || 'Event'} at ${d.venue.name}${tm ? `. ${tm}.` : '.'}`;

  document.getElementById('description').value = copy;

  const specEl = document.getElementById('specials');
  if (sp.length) specEl.value = sp.join(', ');

  onChange();
  btn.textContent = '✨ Auto-fill'; btn.disabled = false;
}
